# Nixpacks 配置 - 用于 Railway 部署

[phases.setup]
nixPkgs = ['nodejs_20', 'pnpm']
aptPkgs = ['build-essential', 'python3']

[phases.install]
cmds = ['npm install -g pnpm@9', 'pnpm install --no-frozen-lockfile']

[phases.build]
cmds = ['pnpm build:railway']

[start]
cmd = 'ls -la dist-web/ && node server/dist/main.js'

# Nixpacks 配置 - 用于 Railway 部署
[phases.setup]
nixPkgs = ['nodejs_20', 'pnpm']
aptPkgs = ['build-essential', 'python3']

[phases.install]
cmds = [
  'npm install -g pnpm@9', 
  'pnpm install --no-frozen-lockfile'
]

[phases.build]
cmds = [
  'echo "=== Build Environment ==="',
  'pwd',
  'ls -la',
  'echo "=== Building server ==="',
  'cd /app/server && pnpm build',
  'echo "=== Building web ==="',
  'cd /app && pnpm build:web',
  'echo "=== Build Output ==="',
  'ls -la /app/dist-web/ || echo "dist-web not found"',
  'ls -la /app/server/dist/ || echo "server/dist not found"'
]

[start]
cmd = 'cd /app && pwd && ls -la && ls -la dist-web/ && node server/dist/main.js'
